services:
  - type: web
    name: seedream-tool
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: VMODEL_SEEDREAM_VERSION
        value: 4ce713043ea0275271d7b65741005f5489b1218c4dfc012cc06763654a92a0aa
